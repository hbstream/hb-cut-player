<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2f7df6"/>
      <stop offset="1" stop-color="#1657c3"/>
    </linearGradient>
  </defs>

  <!-- 圆角方形蓝色底盘 -->
  <rect x="8" y="8" width="240" height="240" rx="48" ry="48" fill="url(#bg)"/>
  <rect x="10" y="10" width="236" height="236" rx="46" ry="46" fill="none"
        stroke="#ffffff" stroke-opacity=".22" stroke-width="2"/>

  <!-- 主体：HBR 大字，占据图标最显眼位置 -->
  <text x="128" y="178"
        font-family="Segoe UI, Helvetica Neue, Helvetica, Arial, sans-serif"
        font-weight="900"
        font-size="138"
        text-anchor="middle"
        letter-spacing="-2"
        fill="#ffffff">HBR</text>

  <!-- 右上角：小播放三角徽标，提示这是播放器 -->
  <circle cx="208" cy="50" r="28" fill="#ffffff"/>
  <polygon points="200,38 222,50 200,62" fill="#1f6feb"/>
</svg>
